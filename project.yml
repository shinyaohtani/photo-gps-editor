name: PhotoGPSEditor
options:
  bundleIdPrefix: com.aabce
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "2611"
settings:
  base:
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  PhotoGPSEditor:
    type: application
    platform: macOS
    sources:
      - PhotoGPSEditor
    entitlements:
      path: PhotoGPSEditor/PhotoGPSEditor.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aabce.PhotoGPSEditor
        DEVELOPMENT_TEAM: PNKEK75AK4
        INFOPLIST_KEY_CFBundleDisplayName: PhotoGPSEditor
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_NSHumanReadableCopyright: "(C) Shinya Ohtani"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES

  PhotoGPSEditorUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - PhotoGPSEditorUITests
    dependencies:
      - target: PhotoGPSEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aabce.PhotoGPSEditorUITests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic

schemes:
  PhotoGPSEditor:
    build:
      targets:
        PhotoGPSEditor: all
        PhotoGPSEditorUITests: [test]
    run:
      config: Release
      debugEnabled: false
    test:
      config: Debug
      targets:
        - PhotoGPSEditorUITests
